name: Test
on:
  push:
    branches: [master]
    paths: # Runs this workflow only when those files change.
      - "*.test.ts"
      - "*.test.tsx"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [master]
    paths: # Runs this workflow only when those files change.
      - "*.test.ts"
      - "*.test.tsx"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/test.yml"
concurrency: # If there is a workflow running when a new one is created, it cancels the old workflow.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
          cache: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
